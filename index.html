<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>导航站</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #ffffff;
      --surface: #f7f7f5;
      --surface-raised: #efeeeb;
      --border: #e2e0dc;
      --accent: #b8860b;
      --accent-dim: #9a7209;
      --accent-glow: rgba(184, 134, 11, 0.06);
      --text-primary: #1a1a1a;
      --text-secondary: #4a4744;
      --text-muted: #9a9793;
      --sidebar-w: 260px;
      --header-h: 56px;
      --radius: 6px;
      --font-display: 'Noto Serif SC', 'Georgia', serif;
      --font-mono: 'JetBrains Mono', 'Menlo', monospace;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 15px; scroll-behavior: smooth; }

    body {
      font-family: var(--font-mono);
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.7;
      overflow: hidden;
      height: 100vh;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .app { display: flex; height: 100vh; }

    /* ===== Sidebar ===== */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: relative;
      z-index: 10;
      transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .sidebar-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-header h1 {
      font-family: var(--font-display);
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .sidebar-header h1::before {
      content: '//';
      color: var(--accent);
      margin-right: 6px;
      font-family: var(--font-mono);
      font-weight: 400;
    }

    .sidebar-search { padding: 12px 16px; flex-shrink: 0; }

    .sidebar-search input {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .sidebar-search input::placeholder { color: var(--text-muted); }

    .sidebar-search input:focus {
      border-color: var(--accent-dim);
      box-shadow: 0 0 0 3px rgba(184, 134, 11, 0.08);
    }

    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0 20px;
    }

    .nav-sec-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 20px;
      color: var(--text-secondary);
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      position: relative;
      text-decoration: none;
      user-select: none;
    }

    .nav-sec-btn::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 2px;
      height: 0;
      background: var(--accent);
      transition: height 0.2s ease;
    }

    .nav-sec-btn:hover {
      color: var(--text-primary);
      background: var(--accent-glow);
    }

    .nav-sec-btn:hover::before { height: 50%; }

    .nav-sec-btn.active {
      color: var(--accent);
      background: var(--accent-glow);
    }

    .nav-sec-btn.active::before { height: 50%; }

    .nav-sec-btn .sec-icon {
      font-size: 0.95rem;
      width: 20px;
      text-align: center;
      flex-shrink: 0;
      line-height: 1;
    }

    .nav-sec-btn .sec-label {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .nav-sec-btn .sec-count {
      font-size: 0.65rem;
      color: var(--text-muted);
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1px 7px;
      flex-shrink: 0;
    }

    .sidebar-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      font-size: 0.68rem;
      color: var(--text-muted);
      text-align: center;
      flex-shrink: 0;
    }

    /* ===== Main ===== */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .main-header {
      height: var(--header-h);
      min-height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .breadcrumb span { color: var(--text-secondary); }
    .breadcrumb .sep { color: var(--text-muted); font-size: 0.7rem; }

    .menu-toggle {
      display: none;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-secondary);
      padding: 6px 10px;
      font-size: 1rem;
      cursor: pointer;
    }

    .menu-toggle:hover {
      border-color: var(--accent-dim);
      color: var(--accent);
    }

    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 36px 40px 80px;
    }

    /* ===== Section header ===== */
    .page-section {
      margin-bottom: 48px;
      scroll-margin-top: 24px;
    }

    .page-section-title {
      font-family: var(--font-display);
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--text-primary);
      padding-bottom: 10px;
      margin-bottom: 18px;
      border-bottom: 2px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .page-section-title .sec-icon {
      font-size: 1.2rem;
    }

    /* ===== Link Grid ===== */
    .link-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 10px;
    }

    .link-card {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--text-primary);
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s, background 0.2s;
      cursor: pointer;
    }

    .link-card:hover {
      border-color: var(--accent-dim);
      background: var(--accent-glow);
      transform: translateY(-1px);
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.05);
    }

    .link-card.hidden { display: none; }

    /* Favicon icon */
    .link-card .card-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
    }

    .link-card .card-icon img {
      width: 18px;
      height: 18px;
      border-radius: 3px;
      object-fit: contain;
      display: block;
    }

    .link-card .card-icon .fallback-letter {
      width: 18px;
      height: 18px;
      border-radius: 3px;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    /* Card body: two rows */
    .link-card .card-body {
      flex: 1;
      min-width: 0;
    }

    .link-card .card-top {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .link-card .card-title {
      font-size: 0.82rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 1;
    }

    .link-card .card-url {
      font-size: 0.66rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 2;
      min-width: 0;
    }

    .link-card .card-desc {
      font-size: 0.72rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
      padding-left: 0;
    }

    /* Loading & Empty */
    .loading-spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 50vh;
      color: var(--text-muted);
      text-align: center;
    }

    .empty-state .empty-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.25;
    }

    .empty-state p { font-size: 0.85rem; }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.25);
      z-index: 5;
    }

    .overlay.active { display: block; }

    /* ===== Mobile ===== */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        transform: translateX(-100%);
        box-shadow: 4px 0 30px rgba(0, 0, 0, 0.12);
      }

      .sidebar.open { transform: translateX(0); }
      .menu-toggle { display: block; }
      .main-content { padding: 24px 16px 60px; }
      .link-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1 id="siteTitle">导航站</h1>
      </div>
      <div class="sidebar-search">
        <input type="text" id="searchInput" placeholder="搜索链接..." autocomplete="off">
      </div>
      <nav class="sidebar-nav" id="sidebarNav">
        <div style="padding:20px;color:var(--text-muted);font-size:0.82rem;">
          <span class="loading-spinner"></span> 加载中...
        </div>
      </nav>
      <div class="sidebar-footer">数据来源: README.md</div>
    </aside>

    <div class="overlay" id="overlay"></div>

    <div class="main">
      <header class="main-header">
        <button class="menu-toggle" id="menuToggle">&#9776;</button>
        <div class="breadcrumb" id="breadcrumb"><span>全部链接</span></div>
        <div style="font-size:0.72rem;color:var(--text-muted);">
          <span id="linkCount">0</span> 个链接
        </div>
      </header>
      <div class="main-content" id="mainContent">
        <div class="empty-state">
          <div class="loading-spinner"></div>
          <p style="margin-top:12px;">加载中...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    var SIDEBAR_FILE = 'README.md';
    var sidebarData = [];
    var allLinks = [];
    var secEls = [];

    var sidebarNav  = document.getElementById('sidebarNav');
    var mainContent = document.getElementById('mainContent');
    var searchInput = document.getElementById('searchInput');
    var linkCount   = document.getElementById('linkCount');
    var siteTitle   = document.getElementById('siteTitle');
    var menuToggle  = document.getElementById('menuToggle');
    var sidebar     = document.getElementById('sidebar');
    var overlay     = document.getElementById('overlay');

    menuToggle.addEventListener('click', function() {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('active');
    });
    overlay.addEventListener('click', function() {
      sidebar.classList.remove('open');
      overlay.classList.remove('active');
    });

    function esc(s) {
      var d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // ========== Favicon ==========
    function getHost(url) {
      try { return new URL(url).hostname; }
      catch(e) {
        var m = url.match(/^https?:\/\/([^\/]+)/);
        return m ? m[1] : '';
      }
    }

    function faviconUrl(url) {
      var host = getHost(url);
      return host ? 'https://www.google.com/s2/favicons?domain=' + encodeURIComponent(host) + '&sz=32' : '';
    }

    function firstLetter(url) {
      var host = getHost(url).replace(/^www\./, '');
      return host ? host.charAt(0).toUpperCase() : '?';
    }

    function shortHost(url) {
      return getHost(url).replace(/^www\./, '');
    }

    function cardIconHtml(url) {
      var fav = faviconUrl(url);
      var letter = firstLetter(url);
      if (!fav) {
        return '<div class="card-icon"><span class="fallback-letter">' + letter + '</span></div>';
      }
      return '<div class="card-icon">' +
        '<img src="' + esc(fav) + '" alt="" loading="lazy"' +
        ' onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"' +
        ' width="18" height="18">' +
        '<span class="fallback-letter" style="display:none">' + letter + '</span>' +
        '</div>';
    }

    // ========== PARSER ==========
    function parseSidebarMarkdown(md) {
      if (md.charCodeAt(0) === 0xFEFF) md = md.substring(1);

      var lines = md.split('\n');
      var sections = [];
      var currentSec = null;
      var inCodeBlock = false;

      for (var i = 0; i < lines.length; i++) {
        var raw = lines[i].replace(/\r/g, '');
        var trimmed = raw.trim();
        if (!trimmed) continue;

        if (trimmed.substring(0, 3) === '```') {
          inCodeBlock = !inCodeBlock;
          continue;
        }
        if (inCodeBlock) continue;

        var c0 = trimmed.charAt(0);
        var c1 = trimmed.charAt(1);
        var c2 = trimmed.charAt(2);

        // # Title
        if (c0 === '#' && c1 === ' ') {
          siteTitle.textContent = trimmed.substring(2).trim();
          continue;
        }

        // ## Section
        if (c0 === '#' && c1 === '#' && c2 === ' ') {
          currentSec = { title: trimmed.substring(3).trim(), icon: '', items: [] };
          sections.push(currentSec);
          continue;
        }

        // > icon
        if (c0 === '>' && currentSec) {
          var afterGt = trimmed.substring(1).trim();
          if (afterGt.length > 0 && afterGt.length <= 6 && afterGt.indexOf(' ') === -1) {
            currentSec.icon = afterGt;
          }
          continue;
        }

        // - [label](url) desc
        var isDash = (c0 === '-' && c1 === ' ');
        var isStar = (c0 === '*' && c1 === ' ');

        if (currentSec && (isDash || isStar)) {
          var lb = trimmed.indexOf('[');
          var rb = (lb !== -1) ? trimmed.indexOf(']', lb) : -1;
          var hasParen = (rb !== -1 && rb + 1 < trimmed.length && trimmed.charAt(rb + 1) === '(');
          var lp = hasParen ? trimmed.indexOf(')', rb + 1) : -1;

          if (lb !== -1 && rb !== -1 && lp !== -1) {
            var label = trimmed.substring(lb + 1, rb).trim();
            var url   = trimmed.substring(rb + 2, lp).trim();

            var icon = '';
            if (lb > 2) icon = trimmed.substring(2, lb).trim();

            var desc = '';
            if (lp < trimmed.length - 1) {
              desc = trimmed.substring(lp + 1).trim().replace(/^[-–—:：\s]+/, '');
            }

            var item = { icon: icon, label: label, url: url, desc: desc };
            currentSec.items.push(item);
            allLinks.push({
              icon: icon, label: label, url: url, desc: desc,
              section: currentSec.title
            });
          }
        }
      }

      linkCount.textContent = allLinks.length;
      console.log('[Nav]', sections.length, 'sections,', allLinks.length, 'links');
      return sections;
    }

    // ========== Render Sidebar ==========
    function renderSidebar(sections) {
      if (!sections.length) {
        sidebarNav.innerHTML = '<div style="padding:20px;color:var(--text-muted);font-size:0.82rem;">未找到分类</div>';
        return;
      }

      var html = '';
      for (var i = 0; i < sections.length; i++) {
        var sec = sections[i];
        html += '<div class="nav-sec-btn" data-sec="' + i + '" onclick="scrollToSection(' + i + ')">';
        html += '<span class="sec-icon">' + (sec.icon || '&#8226;') + '</span>';
        html += '<span class="sec-label">' + esc(sec.title) + '</span>';
        html += '<span class="sec-count">' + sec.items.length + '</span>';
        html += '</div>';
      }

      sidebarNav.innerHTML = html;
    }

    // ========== Render Main Content ==========
    function renderMainContent(sections) {
      if (!sections.length || !allLinks.length) {
        mainContent.innerHTML =
          '<div class="empty-state">' +
          '<div class="empty-icon">&#9888;</div>' +
          '<p>README.md 中未找到链接</p>' +
          '<p style="font-size:0.75rem;margin-top:8px;">格式: <code>- [名称](https://...) 描述</code></p>' +
          '</div>';
        return;
      }

      var html = '';
      secEls = [];

      for (var si = 0; si < sections.length; si++) {
        var sec = sections[si];
        if (!sec.items.length) continue;

        html += '<div class="page-section" id="sec-' + si + '">';
        html += '<div class="page-section-title">';
        html += '<span class="sec-icon">' + (sec.icon || '') + '</span>';
        html += '<span>' + esc(sec.title) + '</span>';
        html += '</div>';
        html += '<div class="link-grid">';

        for (var ii = 0; ii < sec.items.length; ii++) {
          var item = sec.items[ii];
          var host = shortHost(item.url);

          html += '<a class="link-card" href="' + esc(item.url) + '" target="_blank" rel="noopener">';
          html += cardIconHtml(item.url);

          html += '<div class="card-body">';
          html += '<div class="card-top">';
          html += '<span class="card-title">' + esc(item.label) + '</span>';
          if (host) html += '<span class="card-url">' + esc(host) + '</span>';
          html += '</div>';

          // Description line (restored)
          if (item.desc) {
            html += '<div class="card-desc">' + esc(item.desc) + '</div>';
          }

          html += '</div></a>';
        }

        html += '</div></div>';
      }

      mainContent.innerHTML = html;

      secEls = [];
      for (var j = 0; j < sections.length; j++) {
        var el = document.getElementById('sec-' + j);
        if (el) secEls.push({ index: j, el: el });
      }
    }

    // ========== Scroll to section ==========
    function scrollToSection(si) {
      var target = document.getElementById('sec-' + si);
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      sidebar.classList.remove('open');
      overlay.classList.remove('active');
    }

    // ========== Scrollspy ==========
    var scrollspyTimer = null;

    mainContent.addEventListener('scroll', function() {
      if (scrollspyTimer) clearTimeout(scrollspyTimer);
      scrollspyTimer = setTimeout(doScrollspy, 60);
    });

    function doScrollspy() {
      var scrollTop = mainContent.scrollTop;
      var triggerY = scrollTop + 80;
      var activeIdx = 0;

      for (var i = 0; i < secEls.length; i++) {
        if (secEls[i].el.offsetTop <= triggerY) {
          activeIdx = secEls[i].index;
        }
      }

      var btns = document.querySelectorAll('.nav-sec-btn');
      for (var j = 0; j < btns.length; j++) {
        var idx = parseInt(btns[j].getAttribute('data-sec'), 10);
        if (idx === activeIdx) {
          btns[j].classList.add('active');
        } else {
          btns[j].classList.remove('active');
        }
      }
    }

    // ========== Search ==========
    searchInput.addEventListener('input', function(e) {
      var q = e.target.value.toLowerCase().trim();
      var btns = document.querySelectorAll('.nav-sec-btn');
      var sections = document.querySelectorAll('.page-section');
      var i, j, k;

      if (!q) {
        for (i = 0; i < btns.length; i++) btns[i].style.display = '';
        for (j = 0; j < sections.length; j++) {
          sections[j].style.display = '';
          var cards = sections[j].querySelectorAll('.link-card');
          for (k = 0; k < cards.length; k++) cards[k].classList.remove('hidden');
        }
        return;
      }

      for (i = 0; i < sections.length; i++) {
        var sec = sections[i];
        var cards = sec.querySelectorAll('.link-card');
        var hasVisible = false;

        for (j = 0; j < cards.length; j++) {
          var card = cards[j];
          var title = card.querySelector('.card-title').textContent.toLowerCase();
          var urlEl = card.querySelector('.card-url');
          var descEl = card.querySelector('.card-desc');
          var text = title;
          if (urlEl) text += ' ' + urlEl.textContent.toLowerCase();
          if (descEl) text += ' ' + descEl.textContent.toLowerCase();

          if (text.indexOf(q) !== -1) {
            card.classList.remove('hidden');
            hasVisible = true;
          } else {
            card.classList.add('hidden');
          }
        }

        sec.style.display = hasVisible ? '' : 'none';
      }

      for (k = 0; k < btns.length; k++) {
        var idx = parseInt(btns[k].getAttribute('data-sec'), 10);
        var secEl = document.getElementById('sec-' + idx);
        btns[k].style.display = (secEl && secEl.style.display !== 'none') ? '' : 'none';
      }
    });

    // ========== INIT ==========
    (function init() {
      fetch(SIDEBAR_FILE).then(function(resp) {
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        return resp.text();
      }).then(function(md) {
        sidebarData = parseSidebarMarkdown(md);
        renderSidebar(sidebarData);
        renderMainContent(sidebarData);
        setTimeout(doScrollspy, 100);
      }).catch(function(err) {
        console.error('[Nav]', err);
        sidebarNav.innerHTML =
          '<div style="padding:20px;color:#c0392b;font-size:0.82rem;">' +
          '加载失败: ' + err.message + '<br><br>' +
          '<span style="color:var(--text-muted);">确保 README.md 存在于根目录</span></div>';
        mainContent.innerHTML =
