<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>导航站</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #ffffff;
      --surface: #f7f7f5;
      --surface-raised: #efeeeb;
      --border: #e2e0dc;
      --accent: #b8860b;
      --accent-dim: #9a7209;
      --accent-glow: rgba(184, 134, 11, 0.06);
      --text-primary: #1a1a1a;
      --text-secondary: #4a4744;
      --text-muted: #9a9793;
      --sidebar-w: 240px;
      --header-h: 52px;
      --radius: 4px;
      --font-display: 'Noto Serif SC', 'Georgia', serif;
      --font-mono: 'JetBrains Mono', 'Menlo', monospace;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 14px; scroll-behavior: smooth; }

    body {
      font-family: var(--font-mono);
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
      overflow: hidden;
      height: 100vh;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .app { display: flex; height: 100vh; }

    /* ===== Sidebar ===== */
    .sidebar {
      width: var(--sidebar-w); min-width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      height: 100vh; position: relative; z-index: 10;
      transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .sidebar-header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }

    .sidebar-header h1 {
      font-family: var(--font-display);
      font-size: 1.2rem; font-weight: 700; color: var(--text-primary);
    }

    .sidebar-header h1::before {
      content: '//'; color: var(--accent); margin-right: 5px;
      font-family: var(--font-mono); font-weight: 400; font-size: 0.9rem;
    }

    .sidebar-search { padding: 8px 14px; flex-shrink: 0; }

    .sidebar-search input {
      width: 100%; padding: 6px 10px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text-primary);
      font-family: var(--font-mono); font-size: 0.75rem;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }

    .sidebar-search input::placeholder { color: var(--text-muted); }
    .sidebar-search input:focus {
      border-color: var(--accent-dim);
      box-shadow: 0 0 0 2px rgba(184, 134, 11, 0.08);
    }

    .sidebar-nav { flex: 1; overflow-y: auto; padding: 4px 0 16px; }

    .nav-sec-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 18px; color: var(--text-secondary);
      font-size: 0.78rem; font-weight: 500; cursor: pointer;
      transition: all 0.15s ease; position: relative; user-select: none;
    }

    .nav-sec-btn::before {
      content: ''; position: absolute; left: 0; top: 50%;
      transform: translateY(-50%); width: 2px; height: 0;
      background: var(--accent); transition: height 0.2s ease;
    }

    .nav-sec-btn:hover { color: var(--text-primary); background: var(--accent-glow); }
    .nav-sec-btn:hover::before { height: 50%; }
    .nav-sec-btn.active { color: var(--accent); background: var(--accent-glow); }
    .nav-sec-btn.active::before { height: 50%; }

    .nav-sec-btn .sec-icon {
      font-size: 0.85rem; width: 18px;
      text-align: center; flex-shrink: 0; line-height: 1;
    }

    .nav-sec-btn .sec-label {
      flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .nav-sec-btn .sec-count {
      font-size: 0.6rem; color: var(--text-muted);
      background: var(--surface-raised); border: 1px solid var(--border);
      border-radius: 8px; padding: 0 6px; flex-shrink: 0;
    }

    .sidebar-footer {
      padding: 10px 18px; border-top: 1px solid var(--border);
      font-size: 0.62rem; color: var(--text-muted);
      text-align: center; flex-shrink: 0;
    }

    /* ===== Main ===== */
    .main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    .main-header {
      height: var(--header-h); min-height: var(--header-h);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; border-bottom: 1px solid var(--border);
      background: var(--bg); flex-shrink: 0;
    }

    .breadcrumb {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.75rem; color: var(--text-muted);
    }

    .breadcrumb span { color: var(--text-secondary); }
    .breadcrumb .sep { color: var(--text-muted); font-size: 0.65rem; }

    .menu-toggle {
      display: none; background: none; border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text-secondary);
      padding: 5px 9px; font-size: 0.9rem; cursor: pointer;
    }

    .menu-toggle:hover { border-color: var(--accent-dim); color: var(--accent); }

    .main-content { flex: 1; overflow-y: auto; padding: 24px 28px 60px; }

    /* ===== Section ===== */
    .page-section {
      margin-bottom: 28px; scroll-margin-top: 16px;
    }

    .page-section-title {
      font-family: var(--font-display);
      font-size: 1.2rem; font-weight: 700;
      color: var(--text-primary);
      padding-bottom: 6px; margin-bottom: 10px;
      border-bottom: 2px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }

    .page-section-title .sec-icon { font-size: 1rem; }

    /* ===== Sub-group ===== */
    .sub-group {
      margin-top: 14px; margin-bottom: 2px;
    }

    .sub-group:first-child { margin-top: 0; }

    .sub-group-title {
      font-size: 0.72rem; font-weight: 500;
      color: var(--text-muted); letter-spacing: 0.04em;
      padding-bottom: 4px; margin-bottom: 6px;
      border-bottom: 1px dashed var(--border);
    }

    /* ===== Link List (flex-wrap, 自适应宽度) ===== */
    .link-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .link-card {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none; color: var(--text-primary);
      transition: border-color 0.15s, background 0.15s;
      cursor: pointer;
      width: fit-content;
      max-width: 100%;
    }

    .link-card:hover {
      border-color: var(--accent-dim); background: var(--accent-glow);
    }

    .link-card.hidden { display: none; }

    .link-card .card-icon {
      width: 13px; height: 13px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }

    .link-card .card-icon img {
      width: 13px; height: 13px; border-radius: 2px;
      object-fit: contain; display: block;
    }

    .link-card .card-icon .fb {
      width: 13px; height: 13px; border-radius: 2px;
      background: var(--surface-raised); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.45rem; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase;
    }

    .link-card .card-body {
      display: flex; align-items: center; gap: 6px;
      min-width: 0;
    }

    .link-card .card-title {
      font-size: 0.75rem; font-weight: 500;
      white-space: nowrap;
    }

    .link-card .card-desc {
      font-size: 0.62rem; color: var(--text-muted);
      white-space: nowrap;
    }

    /* Loading & Empty */
    .loading-spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.6s linear infinite;
      margin-right: 6px; vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 50vh; color: var(--text-muted); text-align: center;
    }

    .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.25; }
    .empty-state p { font-size: 0.8rem; }

    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.25); z-index: 5;
    }

    .overlay.active { display: block; }

    @media (max-width: 768px) {
      .sidebar {
        position: fixed; left: 0; top: 0;
        transform: translateX(-100%);
        box-shadow: 4px 0 30px rgba(0, 0, 0, 0.12);
      }
      .sidebar.open { transform: translateX(0); }
      .menu-toggle { display: block; }
      .main-content { padding: 16px 14px 40px; }
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header"><h1 id="siteTitle">导航站</h1></div>
      <div class="sidebar-search">
        <input type="text" id="searchInput" placeholder="搜索..." autocomplete="off">
      </div>
      <nav class="sidebar-nav" id="sidebarNav">
        <div style="padding:16px;color:var(--text-muted);font-size:0.78rem;">
          <span class="loading-spinner"></span> 加载中...
        </div>
      </nav>
      <div class="sidebar-footer">数据来源: README.md</div>
    </aside>

    <div class="overlay" id="overlay"></div>

    <div class="main">
      <header class="main-header">
        <button class="menu-toggle" id="menuToggle">&#9776;</button>
        <div class="breadcrumb" id="breadcrumb"><span>全部链接</span></div>
        <div style="font-size:0.68rem;color:var(--text-muted);">
          <span id="linkCount">0</span> 个链接
        </div>
      </header>
      <div class="main-content" id="mainContent">
        <div class="empty-state">
          <div class="loading-spinner"></div>
          <p style="margin-top:10px;">加载中...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    var SIDEBAR_FILE = 'README.md';
    var sidebarData = [];
    var allLinks = [];
    var secEls = [];

    var sidebarNav  = document.getElementById('sidebarNav');
    var mainContent = document.getElementById('mainContent');
    var searchInput = document.getElementById('searchInput');
    var linkCount   = document.getElementById('linkCount');
    var siteTitle   = document.getElementById('siteTitle');
    var menuToggle  = document.getElementById('menuToggle');
    var sidebar     = document.getElementById('sidebar');
    var overlay     = document.getElementById('overlay');

    menuToggle.addEventListener('click', function() {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('active');
    });
    overlay.addEventListener('click', function() {
      sidebar.classList.remove('open');
      overlay.classList.remove('active');
    });

    function esc(s) {
      var d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function getHost(url) {
      try { return new URL(url).hostname; }
      catch(e) { var m = url.match(/^https?:\/\/([^\/]+)/); return m ? m[1] : ''; }
    }

    function faviconUrl(url) {
      var h = getHost(url);
      return h ? 'https://www.google.com/s2/favicons?domain=' + encodeURIComponent(h) + '&sz=32' : '';
    }

    function firstLetter(url) {
      var h = getHost(url).replace(/^www\./, '');
      return h ? h.charAt(0).toUpperCase() : '?';
    }

    function iconHtml(url) {
      var fav = faviconUrl(url);
      var ch = firstLetter(url);
      if (!fav) return '<div class="card-icon"><span class="fb">' + ch + '</span></div>';
      return '<div class="card-icon">' +
        '<img src="' + esc(fav) + '" alt="" loading="lazy"' +
        ' onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"' +
        ' width="13" height="13">' +
        '<span class="fb" style="display:none">' + ch + '</span>' +
        '</div>';
    }

    // ========== PARSER ==========
    function parseSidebarMarkdown(md) {
      if (md.charCodeAt(0) === 0xFEFF) md = md.substring(1);
      var lines = md.split('\n');
      var sections = [];
      var curSec = null;
      var curGroup = null;
      var inCode = false;

      for (var i = 0; i < lines.length; i++) {
        var raw = lines[i].replace(/\r/g, '');
        var t = raw.trim();
        if (!t) continue;
        if (t.substring(0, 3) === '```') { inCode = !inCode; continue; }
        if (inCode) continue;

        var c0 = t.charAt(0), c1 = t.charAt(1), c2 = t.charAt(2), c3 = t.charAt(3);

        if (c0 === '#' && c1 === ' ') {
          siteTitle.textContent = t.substring(2).trim(); continue;
        }

        if (c0 === '#' && c1 === '#' && c2 === ' ') {
          curSec = { title: t.substring(3).trim(), icon: '', groups: [] };
          sections.push(curSec); curGroup = null; continue;
        }

        if (curSec && c0 === '#' && c1 === '#' && c2 === '#' && c3 === ' ') {
          curGroup = { title: t.substring(4).trim(), items: [] };
          curSec.groups.push(curGroup); continue;
        }

        if (c0 === '>' && curSec) {
          var gt = t.substring(1).trim();
          if (gt.length > 0 && gt.length <= 6 && gt.indexOf(' ') === -1) curSec.icon = gt;
          continue;
        }

        var isList = ((c0 === '-' && c1 === ' ') || (c0 === '*' && c1 === ' '));
        if (curSec && isList) {
          if (!curGroup) {
            curGroup = { title: '', items: [] };
            curSec.groups.push(curGroup);
          }
          var lb = t.indexOf('[');
          var rb = (lb !== -1) ? t.indexOf(']', lb) : -1;
          var ok = (rb !== -1 && rb + 1 < t.length && t.charAt(rb + 1) === '(');
          var lp = ok ? t.indexOf(')', rb + 1) : -1;

          if (lb !== -1 && rb !== -1 && lp !== -1) {
            var label = t.substring(lb + 1, rb).trim();
            var url   = t.substring(rb + 2, lp).trim();
            var icon  = (lb > 2) ? t.substring(2, lb).trim() : '';
            var desc  = '';
            if (lp < t.length - 1) {
              desc = t.substring(lp + 1).trim().replace(/^[-–—:：\s]+/, '');
            }
            var item = { icon: icon, label: label, url: url, desc: desc };
            curGroup.items.push(item);
            allLinks.push({ icon: icon, label: label, url: url, desc: desc, section: curSec.title });
          }
        }
      }
      linkCount.textContent = allLinks.length;
      return sections;
    }

    // ========== Sidebar ==========
    function renderSidebar(sections) {
      if (!sections.length) {
        sidebarNav.innerHTML = '<div style="padding:16px;color:var(--text-muted);font-size:0.78rem;">未找到分类</div>';
        return;
      }
      var html = '';
      for (var i = 0; i < sections.length; i++) {
        var s = sections[i];
        var count = 0;
        for (var g = 0; g < s.groups.length; g++) count += s.groups[g].items.length;
        html += '<div class="nav-sec-btn" data-sec="' + i + '" onclick="scrollToSection(' + i + ')">';
        html += '<span class="sec-icon">' + (s.icon || '&#8226;') + '</span>';
        html += '<span class="sec-label">' + esc(s.title) + '</span>';
        html += '<span class="sec-count">' + count + '</span>';
        html += '</div>';
      }
      sidebarNav.innerHTML = html;
    }

    // ========== Main Content ==========
    function renderMainContent(sections) {
      if (!sections.length || !allLinks.length) {
        mainContent.innerHTML = '<div class="empty-state"><div class="empty-icon">&#9888;</div><p>README.md 中未找到链接</p></div>';
        return;
      }
      var html = '';
      secEls = [];

      for (var si = 0; si < sections.length; si++) {
        var sec = sections[si];
        var hasItems = false;
        for (var ck = 0; ck < sec.groups.length; ck++) {
          if (sec.groups[ck].items.length) { hasItems = true; break; }
        }
        if (!hasItems) continue;

        html += '<div class="page-section" id="sec-' + si + '">';
        html += '<div class="page-section-title">';
        html += '<span class="sec-icon">' + (sec.icon || '') + '</span>';
        html += '<span>' + esc(sec.title) + '</span>';
        html += '</div>';

        for (var gi = 0; gi < sec.groups.length; gi++) {
          var group = sec.groups[gi];
          if (!group.items.length) continue;
          if (group.title) {
            html += '<div class="sub-group"><div class="sub-group-title">' + esc(group.title) + '</div>';
          }
          html += '<div class="link-grid">';
          for (var ii = 0; ii < group.items.length; ii++) {
            var item = group.items[ii];
            html += '<a class="link-card" href="' + esc(item.url) + '" target="_blank" rel="noopener">';
            html += iconHtml(item.url);
            html += '<div class="card-body">';
            html += '<span class="card-title">' + esc(item.label) + '</span>';
            if (item.desc) html += '<span class="card-desc">' + esc(item.desc) + '</span>';
            html += '</div></a>';
          }
          html += '</div>';
          if (group.title) html += '</div>';
        }
        html += '</div>';
      }

      mainContent.innerHTML = html;
      secEls = [];
      for (var j = 0; j < sections.length; j++) {
        var el = document.getElementById('sec-' + j);
        if (el) secEls.push({ index: j, el: el });
      }
    }

    function scrollToSection(si) {
      var t = document.getElementById('sec-' + si);
      if (t) t.scrollIntoView({ behavior: 'smooth', block: 'start' });
      sidebar.classList.remove('open');
      overlay.classList.remove('active');
    }

    // Scrollspy
    var spTimer = null;
    mainContent.addEventListener('scroll', function() {
      if (spTimer) clearTimeout(spTimer);
      spTimer = setTimeout(doScrollspy, 60);
    });

    function doScrollspy() {
      var y = mainContent.scrollTop + 60;
      var ai = 0;
      for (var i = 0; i < secEls.length; i++) {
        if (secEls[i].el.offsetTop <= y) ai = secEls[i].index;
      }
      var btns = document.querySelectorAll('.nav-sec-btn');
      for (var j = 0; j < btns.length; j++) {
        var idx = parseInt(btns[j].getAttribute('data-sec'), 10);
        btns[j].classList.toggle('active', idx === ai);
      }
    }

    // Search
    searchInput.addEventListener('input', function(e) {
      var q = e.target.value.toLowerCase().trim();
      var btns = document.querySelectorAll('.nav-sec-btn');
      var secs = document.querySelectorAll('.page-section');
      var i, j, k;

      if (!q) {
        for (i = 0; i < btns.length; i++) btns[i].style.display = '';
        for (j = 0; j < secs.length; j++) {
          secs[j].style.display = '';
          var cs = secs[j].querySelectorAll('.link-card');
          for (k = 0; k < cs.length; k++) cs[k].classList.remove('hidden');
          var sgs = secs[j].querySelectorAll('.sub-group');
          for (k = 0; k < sgs.length; k++) sgs[k].style.display = '';
        }
        return;
      }

      for (i = 0; i < secs.length; i++) {
        var sec = secs[i];
        var cards = sec.querySelectorAll('.link-card');
        var vis = false;
        for (j = 0; j < cards.length; j++) {
          var c = cards[j];
          var txt = c.querySelector('.card-title').textContent.toLowerCase();
          var de = c.querySelector('.card-desc');
          if (de) txt += ' ' + de.textContent.toLowerCase();
          var match = txt.indexOf(q) !== -1;
          c.classList.toggle('hidden', !match);
          if (match) vis = true;
        }
        sec.style.display = vis ? '' : 'none';
        var sgs = sec.querySelectorAll('.sub-group');
        for (k = 0; k < sgs.length; k++) {
          var sgCards = sgs[k].querySelectorAll('.link-card:not(.hidden)');
          sgs[k].style.display = sgCards.length ? '' : 'none';
        }
      }

      for (k = 0; k < btns.length; k++) {
        var idx = parseInt(btns[k].getAttribute('data-sec'), 10);
        var el = document.getElementById('sec-' + idx);
        btns[k].style.display = (el && el.style.display !== 'none') ? '' : 'none';
      }
    });

    // INIT
    (function init() {
      fetch(SIDEBAR_FILE).then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.text();
      }).then(function(md) {
        sidebarData = parseSidebarMarkdown(md);
        renderSidebar(sidebarData);
        renderMainContent(sidebarData);
        setTimeout(doScrollspy, 100);
      }).catch(function(err) {
        sidebarNav.innerHTML =
          '<div style="padding:16px;color:#c0392b;font-size:0.78rem;">加载失败: ' + err.message +
          '<br><span style="color:var(--text-muted);">确保 README.md 存在于根目录</span></div>';
        mainContent.innerHTML =
          '<div class="empty-state"><div class="empty-icon">&#9888;</div><p>加载失败</p></div>';
      });
    })();
  </script>
</body>
</html>
