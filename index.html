<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>我的网址导航</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- docsify默认主题 -->
  <link rel="stylesheet" href="https://unpkg.com/docsify/lib/themes/vue.css">
  <!-- 侧边栏折叠插件样式 -->
  <link rel="stylesheet" href="https://unpkg.com/docsify-sidebar-collapse/dist/sidebar.min.css">
  
  <!-- 自定义侧边栏样式 -->
  <style>
    .sidebar {
      width: 260px;
      background-color: #f8f9fa;
      border-right: 1px solid #e9ecef;
    }
    .sidebar ul li a {
      font-size: 15px;
      padding: 8px 16px;
      color: #333;
    }
    .sidebar ul li a:hover {
      color: #3F51B5;
      background-color: #e8eaf6;
    }
    .sidebar ul li strong {
      color: #3F51B5;
      font-size: 14px;
      margin-top: 12px;
      padding-left: 12px;
      display: block;
    }
    .markdown-section {
      max-width: 900px;
      margin: 0 auto;
    }
    /* 搜索框样式 */
    .search {
      margin: 12px 16px;
    }
    .search input {
      border-radius: 20px;
      padding: 8px 16px;
      border: 1px solid #ddd;
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>

  <!-- docsify核心脚本 -->
  <script src="https://unpkg.com/docsify/lib/docsify.min.js"></script>
  <!-- 搜索插件 -->
  <script src="https://unpkg.com/docsify/lib/plugins/search.min.js"></script>
  <!-- 侧边栏折叠插件 -->
  <script src="https://unpkg.com/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>

  <script>
    window.$docsify = {
      name: '我的网址导航',
      repo: '', // 可以填你的GitHub仓库地址，会显示在右上角
      loadSidebar: true, // 开启从_sidebar.md加载侧边栏
      subMaxLevel: 0, // 禁止自动生成侧边栏，完全使用_sidebar.md的配置
      basePath: '/nav/', 
      auto2top: true, // 切换页面时自动滚动到顶部
      sidebarScroll: true, // 侧边栏内容过长时可滚动
      // 侧边栏折叠配置：默认展开第1级分组
      sidebarCollapse: {
        defaultOpenLevel: 1
      },
      // 搜索插件配置
      search: {
        paths: 'auto',
        placeholder: '搜索站点名称...',
        noData: '找不到匹配的站点',
        depth: 2 // 搜索标题层级
      },
      themeColor: '#3F51B5'
    }
  </script>
</body>
</html>
