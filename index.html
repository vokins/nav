<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>导航站</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Marked.js for Markdown parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    /* ========== CSS Custom Properties ========== */
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-raised: #1c1c1c;
      --border: #2a2a2a;
      --accent: #e8b931;
      --accent-dim: #c49a1a;
      --accent-glow: rgba(232, 185, 49, 0.08);
      --text-primary: #e8e4dc;
      --text-secondary: #9a958e;
      --text-muted: #5a5652;
      --sidebar-w: 280px;
      --header-h: 56px;
      --radius: 6px;
      --font-display: 'Noto Serif SC', 'Georgia', serif;
      --font-mono: 'JetBrains Mono', 'Menlo', monospace;
    }

    /* ========== Reset ========== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 15px;
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-mono);
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.7;
      overflow: hidden;
      height: 100vh;
    }

    /* ========== Grain Overlay ========== */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 9999;
    }

    /* ========== Scrollbar ========== */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ========== Layout ========== */
    .app {
      display: flex;
      height: 100vh;
    }

    /* ========== Sidebar ========== */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: relative;
      z-index: 10;
      transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .sidebar-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-header h1 {
      font-family: var(--font-display);
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.02em;
    }

    .sidebar-header h1::before {
      content: '//';
      color: var(--accent);
      margin-right: 6px;
      font-family: var(--font-mono);
      font-weight: 400;
    }

    .sidebar-search {
      padding: 12px 16px;
      flex-shrink: 0;
    }

    .sidebar-search input {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .sidebar-search input::placeholder {
      color: var(--text-muted);
    }

    .sidebar-search input:focus {
      border-color: var(--accent-dim);
    }

    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0 20px;
    }

    /* Sidebar sections */
    .nav-section {
      margin-bottom: 4px;
    }

    .nav-section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
      transition: color 0.2s;
    }

    .nav-section-title:hover {
      color: var(--text-secondary);
    }

    .nav-section-title .chevron {
      font-size: 0.6rem;
      transition: transform 0.2s ease;
    }

    .nav-section.collapsed .chevron {
      transform: rotate(-90deg);
    }

    .nav-section.collapsed .nav-items {
      display: none;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 20px 7px 28px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.82rem;
      transition: all 0.15s ease;
      position: relative;
      cursor: pointer;
    }

    .nav-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 2px;
      height: 0;
      background: var(--accent);
      transition: height 0.2s ease;
    }

    .nav-item:hover {
      color: var(--text-primary);
      background: var(--accent-glow);
    }

    .nav-item:hover::before {
      height: 60%;
    }

    .nav-item.active {
      color: var(--accent);
      background: var(--accent-glow);
    }

    .nav-item.active::before {
      height: 60%;
    }

    .nav-item .item-icon {
      font-size: 0.95rem;
      width: 18px;
      text-align: center;
      flex-shrink: 0;
    }

    .nav-item .item-label {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ========== Main Content ========== */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .main-header {
      height: var(--header-h);
      min-height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .breadcrumb span {
      color: var(--text-secondary);
    }

    .breadcrumb .sep {
      color: var(--text-muted);
      font-size: 0.7rem;
    }

    .menu-toggle {
      display: none;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-secondary);
      padding: 6px 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .menu-toggle:hover {
      border-color: var(--accent-dim);
      color: var(--accent);
    }

    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 36px 40px 60px;
    }

    /* ========== Content Styling ========== */
    .content-area {
      max-width: 960px;
      animation: fadeIn 0.4s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .content-area h1 {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    .content-area h2 {
      font-family: var(--font-display);
      font-size: 1.45rem;
      font-weight: 700;
      margin-top: 40px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      color: var(--text-primary);
    }

    .content-area h2::before {
      content: '#';
      color: var(--accent);
      margin-right: 8px;
      font-family: var(--font-mono);
      font-weight: 400;
      font-size: 1.1rem;
    }

    .content-area h3 {
      font-size: 1.1rem;
      font-weight: 500;
      margin-top: 28px;
      margin-bottom: 12px;
      color: var(--text-primary);
    }

    .content-area p {
      margin-bottom: 16px;
      color: var(--text-secondary);
    }

    .content-area a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    .content-area a:hover {
      border-bottom-color: var(--accent);
    }

    .content-area code {
      background: var(--surface-raised);
      border: 1px solid var(--border);
      padding: 2px 6px;
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 0.85em;
      color: var(--accent);
    }

    .content-area pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      overflow-x: auto;
      margin-bottom: 20px;
    }

    .content-area pre code {
      background: none;
      border: none;
      padding: 0;
      color: var(--text-secondary);
      font-size: 0.82rem;
    }

    .content-area ul, .content-area ol {
      padding-left: 24px;
      margin-bottom: 16px;
      color: var(--text-secondary);
    }

    .content-area li {
      margin-bottom: 6px;
    }

    .content-area hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }

    .content-area blockquote {
      border-left: 3px solid var(--accent);
      padding: 8px 16px;
      margin: 16px 0;
      background: var(--accent-glow);
      color: var(--text-secondary);
    }

    .content-area blockquote p {
      margin-bottom: 0;
    }

    /* ========== Link Cards Grid ========== */
    .link-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
      margin-bottom: 32px;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--text-primary);
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .link-card:hover {
      border-color: var(--accent-dim);
      background: var(--accent-glow);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .link-card .card-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--surface-raised);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }

    .link-card .card-body {
      flex: 1;
      min-width: 0;
    }

    .link-card .card-title {
      font-size: 0.85rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-card .card-desc {
      font-size: 0.72rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    /* ========== Empty State ========== */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60vh;
      color: var(--text-muted);
      text-align: center;
    }

    .empty-state .empty-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .empty-state p {
      font-size: 0.85rem;
    }

    /* ========== Loading ========== */
    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ========== Footer ========== */
    .sidebar-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      font-size: 0.68rem;
      color: var(--text-muted);
      text-align: center;
      flex-shrink: 0;
    }

    /* ========== Overlay (mobile) ========== */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 5;
    }

    .overlay.active {
      display: block;
    }

    /* ========== Responsive ========== */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        transform: translateX(-100%);
        box-shadow: 4px 0 30px rgba(0, 0, 0, 0.4);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .menu-toggle {
        display: block;
      }

      .main-content {
        padding: 24px 20px 40px;
      }

      .link-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ========== Stagger animation for cards ========== */
    .link-card {
      opacity: 0;
      animation: cardIn 0.35s ease forwards;
    }

    .link-card:nth-child(1)  { animation-delay: 0.02s; }
    .link-card:nth-child(2)  { animation-delay: 0.04s; }
    .link-card:nth-child(3)  { animation-delay: 0.06s; }
    .link-card:nth-child(4)  { animation-delay: 0.08s; }
    .link-card:nth-child(5)  { animation-delay: 0.10s; }
    .link-card:nth-child(6)  { animation-delay: 0.12s; }
    .link-card:nth-child(7)  { animation-delay: 0.14s; }
    .link-card:nth-child(8)  { animation-delay: 0.16s; }
    .link-card:nth-child(9)  { animation-delay: 0.18s; }
    .link-card:nth-child(10) { animation-delay: 0.20s; }
    .link-card:nth-child(11) { animation-delay: 0.22s; }
    .link-card:nth-child(12) { animation-delay: 0.24s; }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1 id="siteTitle">导航站</h1>
      </div>
      <div class="sidebar-search">
        <input type="text" id="searchInput" placeholder="搜索链接..." autocomplete="off">
      </div>
      <nav class="sidebar-nav" id="sidebarNav">
        <div style="padding:20px; color:var(--text-muted); font-size:0.82rem;">
          <span class="loading-spinner"></span> 加载 sidebar.md ...
        </div>
      </nav>
      <div class="sidebar-footer">
        数据来源: sidebar.md &middot; Powered by GitHub Pages
      </div>
    </aside>

    <!-- Overlay for mobile -->
    <div class="overlay" id="overlay"></div>

    <!-- Main -->
    <div class="main">
      <header class="main-header">
        <button class="menu-toggle" id="menuToggle">&#9776;</button>
        <div class="breadcrumb" id="breadcrumb">
          <span>首页</span>
        </div>
        <div style="font-size:0.72rem; color:var(--text-muted);">
          <span id="linkCount">0</span> 个链接
        </div>
      </header>
      <div class="main-content" id="mainContent">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">&#9881;</div>
          <p>请从左侧选择一个分类</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ========== Configuration ==========
    const SIDEBAR_FILE = 'sidebar.md';

    // ========== State ==========
    let sidebarData = [];      // parsed structure
    let allLinks = [];         // flat list of all links
    let currentSection = null;

    // ========== DOM References ==========
    const sidebarNav = document.getElementById('sidebarNav');
    const mainContent = document.getElementById('mainContent');
    const breadcrumb = document.getElementById('breadcrumb');
    const searchInput = document.getElementById('searchInput');
    const linkCount = document.getElementById('linkCount');
    const emptyState = document.getElementById('emptyState');
    const siteTitle = document.getElementById('siteTitle');
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');

    // ========== Mobile Menu ==========
    menuToggle.addEventListener('click', () => {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('active');
    });

    overlay.addEventListener('click', () => {
      sidebar.classList.remove('open');
      overlay.classList.remove('active');
    });

    // ========== Markdown Parser (custom for sidebar) ==========
    function parseSidebarMarkdown(md) {
      const lines = md.split('\n');
      const sections = [];
      let currentSec = null;
      let totalLinks = 0;

      for (const raw of lines) {
        const line = raw.trim();

        // Top-level title: # Title
        const titleMatch = line.match(/^#\s+(.+)$/);
        if (titleMatch && !line.startsWith('##')) {
          siteTitle.textContent = titleMatch[1].trim();
          continue;
        }

        // Section header: ## Section
        const h2Match = line.match(/^##\s+(.+)$/);
        if (h2Match) {
          currentSec = {
            title: h2Match[1].trim(),
            icon: '',
            items: []
          };
          sections.push(currentSec);
          continue;
        }

        // Icon line: > emoji  (placed right after ## to set section icon)
        if (currentSec && line.startsWith('>')) {
          const iconText = line.replace(/^>\s*/, '').trim();
          if (iconText.length <= 4) {
            currentSec.icon = iconText;
          }
          continue;
        }

        // Link item: - [Label](url) description
        // or: - icon [Label](url) description
        const linkMatch = line.match(/^-\s+(?:(\S+)\s+)?$$(.+?)$$$$(.+?)$$\s*(.*)?$/);
        if (linkMatch && currentSec) {
          const item = {
            icon: linkMatch[1] || '',
            label: linkMatch[2].trim(),
            url: linkMatch[3].trim(),
            desc: (linkMatch[4] || '').replace(/^[-–—:：\s]+/, '').trim()
          };
          currentSec.items.push(item);
          allLinks.push({ ...item, section: currentSec.title });
          totalLinks++;
        }
      }

      linkCount.textContent = totalLinks;
      return sections;
    }

    // ========== Render Sidebar ==========
    function renderSidebar(sections) {
      if (sections.length === 0) {
        sidebarNav.innerHTML = '<div style="padding:20px; color:var(--text-muted); font-size:0.82rem;">sidebar.md 中未找到导航数据</div>';
        return;
      }

      let html = '';
      sections.forEach((sec, si) => {
        html += `<div class="nav-section" data-section="${si}">`;
        html += `<div class="nav-section-title" onclick="toggleSection(${si})">`;
        html += `<span>${sec.icon ? sec.icon + ' ' : ''}${sec.title}</span>`;
        html += `<span class="chevron">&#9660;</span>`;
        html += `</div>`;
        html += `<div class="nav-items">`;
        sec.items.forEach((item, ii) => {
          html += `<a class="nav-item" data-section="${si}" data-item="${ii}" onclick="selectItem(${si}, ${ii}, event)">`;
          html += `<span class="item-icon">${item.icon || '&#9679;'}</span>`;
          html += `<span class="item-label">${item.label}</span>`;
          html += `</a>`;
        });
        html += `</div></div>`;
      });

      sidebarNav.innerHTML = html;
    }

    // ========== Toggle Section Collapse ==========
    function toggleSection(si) {
      const el = document.querySelector(`.nav-section[data-section="${si}"]`);
      if (el) el.classList.toggle('collapsed');
    }

    // ========== Select Item ==========
    function selectItem(si, ii, event) {
      event.preventDefault();
      const sec = sidebarData[si];
      const item = sec.items[ii];

      // Update active state
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      if (event.currentTarget) event.currentTarget.classList.add('active');

      // Update breadcrumb
      breadcrumb.innerHTML = `<span>${sec.title}</span><span class="sep">/</span><span>${item.label}</span>`;

      // Close mobile menu
      sidebar.classList.remove('open');
      overlay.classList.remove('active');

      // Try to load linked .md file as content, otherwise show link card
      if (item.url.endsWith('.md')) {
        loadContent(item.url, item.label);
      } else {
        showLinkPage(sec, item);
      }

      currentSection = si;
    }

    // ========== Show Link Page (for external URLs) ==========
    function showLinkPage(sec, item) {
      // Build a page showing the link and all related links in the section
      let html = '<div class="content-area">';
      html += `<h1>${sec.icon ? sec.icon + ' ' : ''}${item.label}</h1>`;

      if (item.desc) {
        html += `<p style="color:var(--text-secondary); margin-bottom:8px;">${item.desc}</p>`;
      }

      html += `<p><a href="${item.url}" target="_blank" rel="noopener" style="
        display:inline-block; padding:10px 24px; background:var(--accent); color:var(--bg);
        border-radius:var(--radius); font-weight:500; font-size:0.85rem; border-bottom:none;
        margin:12px 0 28px; transition:all 0.2s;
      " onmouseover="this.style.background='var(--accent-dim)'" onmouseout="this.style.background='var(--accent)'">
        前往访问 &rarr;
      </a></p>`;

      // Show other links in same section
      if (sec.items.length > 1) {
        html += `<h2>同分类推荐</h2>`;
        html += '<div class="link-grid">';
        sec.items.forEach(other => {
          if (other.url === item.url) return;
          html += `<a class="link-card" href="${other.url}" target="_blank" rel="noopener" style="text-decoration:none;">`;
          html += `<div class="card-icon">${other.icon || '&#9679;'}</div>`;
          html += `<div class="card-body">`;
          html += `<div class="card-title">${other.label}</div>`;
          if (other.desc) html += `<div class="card-desc">${other.desc}</div>`;
          html += `</div></a>`;
        });
        html += '</div>';
      }

      html += '</div>';
      mainContent.innerHTML = html;
      mainContent.scrollTop = 0;
    }

    // ========== Load Content from .md File ==========
    async function loadContent(url, label) {
      mainContent.innerHTML = `<div class="content-area"><p><span class="loading-spinner"></span> 加载 ${label} ...</p></div>`;

      try {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const md = await resp.text();
        const html = marked.parse(md);
        mainContent.innerHTML = `<div class="content-area">${html}</div>`;
        mainContent.scrollTop = 0;
      } catch (err) {
        mainContent.innerHTML = `<div class="content-area"><h1>${label}</h1><p style="color:var(--text-muted);">无法加载文件: ${url}<br>${err.message}</p></div>`;
      }
    }

    // ========== Show All Links (overview) ==========
    function showOverview() {
      let html = '<div class="content-area"><h1>全部链接</h1>';

      sidebarData.forEach(sec => {
        html += `<h2>${sec.title}</h2>`;
        html += '<div class="link-grid">';
        sec.items.forEach((item, ii) => {
          html += `<a class="link-card" href="${item.url}" target="_blank" rel="noopener" style="text-decoration:none;">`;
          html += `<div class="card-icon">${item.icon || '&#9679;'}</div>`;
          html += `<div class="card-body">`;
          html += `<div class="card-title">${item.label}</div>`;
          if (item.desc) html += `<div class="card-desc">${item.desc}</div>`;
          html += `</div></a>`;
        });
        html += '</div>';
      });

      html += '</div>';
      mainContent.innerHTML = html;
      breadcrumb.innerHTML = '<span>全部链接</span>';
      mainContent.scrollTop = 0;
    }

    // ========== Search ==========
    searchInput.addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase().trim();

      if (!q) {
        // Restore sidebar
        document.querySelectorAll('.nav-section').forEach(el => el.style.display = '');
        document.querySelectorAll('.nav-item').forEach(el => el.style.display = '');
        return;
      }

      // Filter sidebar items
      document.querySelectorAll('.nav-section').forEach(sec => {
        let hasVisible = false;
        sec.querySelectorAll('.nav-item').forEach(item => {
          const label = item.querySelector('.item-label').textContent.toLowerCase();
          const match = label.includes(q);
          item.style.display = match ? '' : 'none';
          if (match) hasVisible = true;
        });
        sec.style.display = hasVisible ? '' : 'none';
        // Auto-expand matching sections
        if (hasVisible) sec.classList.remove('collapsed');
      });

      // Also show search results in main content
      const results = allLinks.filter(l =>
        l.label.toLowerCase().includes(q) ||
        l.desc.toLowerCase().includes(q) ||
        l.section.toLowerCase().includes(q)
      );

      if (results.length > 0) {
        let html = `<div class="content-area"><h1>搜索: "${e.target.value}"</h1>`;
        html += `<p style="color:var(--text-muted); margin-bottom:20px;">找到 ${results.length} 个结果</p>`;
        html += '<div class="link-grid">';
        results.forEach(item => {
          html += `<a class="link-card" href="${item.url}" target="_blank" rel="noopener" style="text-decoration:none;">`;
          html += `<div class="card-icon">${item.icon || '&#9679;'}</div>`;
          html += `<div class="card-body">`;
          html += `<div class="card-title">${item.label}</div>`;
          if (item.desc) html += `<div class="card-desc">${item.desc}</div>`;
          html += `<div class="card-desc" style="color:var(--accent-dim);">${item.section}</div>`;
          html += `</div></a>`;
        });
        html += '</div></div>';
        mainContent.innerHTML = html;
      } else {
        mainContent.innerHTML = `<div class="content-area"><div class="empty-state" style="height:40vh;"><p>未找到匹配结果</p></div></div>`;
      }
    });

    // ========== Initialize ==========
    async function init() {
      try {
        const resp = await fetch(SIDEBAR_FILE);
        if (!resp.ok) throw new Error(`无法加载 ${SIDEBAR_FILE} (HTTP ${resp.status})`);
        const md = await resp.text();
        sidebarData = parseSidebarMarkdown(md);
        renderSidebar(sidebarData);

        // Auto-show overview
        if (sidebarData.length > 0) {
          showOverview();
        }
      } catch (err) {
        sidebarNav.innerHTML = `<div style="padding:20px; color:#e74c3c; font-size:0.82rem;">
          加载失败: ${err.message}<br><br>
          <span style="color:var(--text-muted);">请确保 <code>sidebar.md</code> 文件存在于根目录</span>
        </div>`;
      }
    }

    init();
  </script>
</body>
</html>
