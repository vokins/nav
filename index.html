<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>导航站</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      --bg: #ffffff;
      --surface: #f7f7f5;
      --surface-raised: #efeeeb;
      --border: #e2e0dc;
      --accent: #b8860b;
      --accent-dim: #9a7209;
      --accent-glow: rgba(184, 134, 11, 0.06);
      --text-primary: #1a1a1a;
      --text-secondary: #4a4744;
      --text-muted: #9a9793;
      --sidebar-w: 280px;
      --header-h: 56px;
      --radius: 6px;
      --font-display: 'Noto Serif SC', 'Georgia', serif;
      --font-mono: 'JetBrains Mono', 'Menlo', monospace;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 15px; scroll-behavior: smooth; }

    body {
      font-family: var(--font-mono);
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.7;
      overflow: hidden;
      height: 100vh;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .app { display: flex; height: 100vh; }

    /* ===== Sidebar ===== */
    .sidebar {
      width: var(--sidebar-w); min-width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      height: 100vh; position: relative; z-index: 10;
      transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .sidebar-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-header h1 {
      font-family: var(--font-display);
      font-size: 1.35rem; font-weight: 700;
      color: var(--text-primary);
    }

    .sidebar-header h1::before {
      content: '//'; color: var(--accent);
      margin-right: 6px;
      font-family: var(--font-mono); font-weight: 400;
    }

    .sidebar-search { padding: 12px 16px; flex-shrink: 0; }

    .sidebar-search input {
      width: 100%; padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-family: var(--font-mono); font-size: 0.8rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .sidebar-search input::placeholder { color: var(--text-muted); }
    .sidebar-search input:focus {
      border-color: var(--accent-dim);
      box-shadow: 0 0 0 3px rgba(184, 134, 11, 0.08);
    }

    .sidebar-nav { flex: 1; overflow-y: auto; padding: 8px 0 20px; }
    .nav-section { margin-bottom: 4px; }

    .nav-section-title {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 20px;
      font-size: 0.7rem; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--text-muted);
      cursor: pointer; user-select: none;
    }

    .nav-section-title:hover { color: var(--text-secondary); }

    .nav-section-title .chevron {
      font-size: 0.6rem; transition: transform 0.2s ease;
    }

    .nav-section.collapsed .chevron { transform: rotate(-90deg); }
    .nav-section.collapsed .nav-items { display: none; }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 20px 7px 28px;
      color: var(--text-secondary);
      text-decoration: none; font-size: 0.82rem;
      transition: all 0.15s ease;
      position: relative; cursor: pointer;
    }

    .nav-item::before {
      content: '';
      position: absolute; left: 0; top: 50%; transform: translateY(-50%);
      width: 2px; height: 0;
      background: var(--accent);
      transition: height 0.2s ease;
    }

    .nav-item:hover { color: var(--text-primary); background: var(--accent-glow); }
    .nav-item:hover::before { height: 60%; }
    .nav-item.active { color: var(--accent); background: var(--accent-glow); }
    .nav-item.active::before { height: 60%; }

    .nav-item .item-icon {
      font-size: 0.95rem; width: 18px;
      text-align: center; flex-shrink: 0;
    }

    .nav-item .item-label {
      flex: 1; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }

    /* ===== Main ===== */
    .main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    .main-header {
      height: var(--header-h); min-height: var(--header-h);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px;
      border-bottom: 1px solid var(--border);
      background: var(--bg); flex-shrink: 0;
    }

    .breadcrumb {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.8rem; color: var(--text-muted);
    }

    .breadcrumb span { color: var(--text-secondary); }
    .breadcrumb .sep { color: var(--text-muted); font-size: 0.7rem; }

    .menu-toggle {
      display: none;
      background: none; border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-secondary);
      padding: 6px 10px; font-size: 1rem; cursor: pointer;
    }

    .menu-toggle:hover { border-color: var(--accent-dim); color: var(--accent); }
    .main-content { flex: 1; overflow-y: auto; padding: 36px 40px 60px; }

    /* ===== Content Area ===== */
    .content-area { max-width: 960px; }

    .content-area h1 {
      font-family: var(--font-display);
      font-size: 2rem; font-weight: 700;
      margin-bottom: 12px; color: var(--text-primary);
    }

    .content-area h2 {
      font-family: var(--font-display);
      font-size: 1.45rem; font-weight: 700;
      margin-top: 36px; margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      color: var(--text-primary);
    }

    .content-area h2::before {
      content: '#'; color: var(--accent);
      margin-right: 8px;
      font-family: var(--font-mono); font-weight: 400; font-size: 1.1rem;
    }

    .content-area p { margin-bottom: 16px; color: var(--text-secondary); }

    .content-area a {
      color: var(--accent); text-decoration: none;
      border-bottom: 1px solid transparent;
    }

    .content-area a:hover { border-bottom-color: var(--accent); }

    .content-area code {
      background: var(--surface-raised);
      border: 1px solid var(--border);
      padding: 2px 6px; border-radius: 3px;
      font-family: var(--font-mono); font-size: 0.85em;
      color: var(--accent-dim);
    }

    .content-area pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      overflow-x: auto; margin-bottom: 20px;
    }

    .content-area pre code {
      background: none; border: none; padding: 0;
      color: var(--text-secondary); font-size: 0.82rem;
    }

    .content-area ul, .content-area ol {
      padding-left: 24px; margin-bottom: 16px; color: var(--text-secondary);
    }

    .content-area li { margin-bottom: 6px; }

    .content-area blockquote {
      border-left: 3px solid var(--accent);
      padding: 8px 16px; margin: 16px 0;
      background: var(--accent-glow); color: var(--text-secondary);
    }

    .content-area blockquote p { margin-bottom: 0; }

    /* ===== Link Grid ===== */
    .link-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px; margin-bottom: 28px;
    }

    .link-card {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none; color: var(--text-primary);
      transition: transform 0.2s ease, border-color 0.2s, box-shadow 0.2s, background 0.2s;
      cursor: pointer;
    }

    .link-card:hover {
      border-color: var(--accent-dim);
      background: var(--accent-glow);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
    }

    .link-card .card-icon {
      width: 36px; height: 36px;
      border-radius: 8px; background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0;
      border: 1px solid var(--border);
    }

    .link-card .card-body { flex: 1; min-width: 0; }

    .link-card .card-title {
      font-size: 0.85rem; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .link-card .card-desc {
      font-size: 0.72rem; color: var(--text-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-top: 2px;
    }

    /* ===== Visit Button ===== */
    .visit-btn {
      display: inline-block; padding: 10px 24px;
      background: var(--accent); color: #fff;
      border-radius: var(--radius);
      font-weight: 500; font-size: 0.85rem;
      text-decoration: none; border-bottom: none;
      margin: 12px 0 28px;
      transition: background 0.2s;
    }

    .visit-btn:hover { background: var(--accent-dim); border-bottom: none; }

    /* ===== Empty State ===== */
    .empty-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 60vh; color: var(--text-muted); text-align: center;
    }

    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.25; }
    .empty-state p { font-size: 0.85rem; }

    /* ===== Loading ===== */
    .loading-spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.6s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .sidebar-footer {
      padding: 12px 20px; border-top: 1px solid var(--border);
      font-size: 0.68rem; color: var(--text-muted);
      text-align: center; flex-shrink: 0;
    }

    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.25); z-index: 5;
    }

    .overlay.active { display: block; }

    /* ===== Mobile ===== */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed; left: 0; top: 0;
        transform: translateX(-100%);
        box-shadow: 4px 0 30px rgba(0, 0, 0, 0.12);
      }
      .sidebar.open { transform: translateX(0); }
      .menu-toggle { display: block; }
      .main-content { padding: 24px 20px 40px; }
      .link-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1 id="siteTitle">导航站</h1>
      </div>
      <div class="sidebar-search">
        <input type="text" id="searchInput" placeholder="搜索链接..." autocomplete="off">
      </div>
      <nav class="sidebar-nav" id="sidebarNav">
        <div style="padding:20px;color:var(--text-muted);font-size:0.82rem;">
          <span class="loading-spinner"></span> 加载 README.md ...
        </div>
      </nav>
      <div class="sidebar-footer">
        数据来源: README.md &middot; Powered by GitHub Pages
      </div>
    </aside>

    <div class="overlay" id="overlay"></div>

    <!-- Main -->
    <div class="main">
      <header class="main-header">
        <button class="menu-toggle" id="menuToggle">&#9776;</button>
        <div class="breadcrumb" id="breadcrumb"><span>首页</span></div>
        <div style="font-size:0.72rem;color:var(--text-muted);">
          <span id="linkCount">0</span> 个链接
        </div>
      </header>
      <div class="main-content" id="mainContent">
        <div class="empty-state">
          <div class="empty-icon">&#9881;</div>
          <p>请从左侧选择一个分类</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SIDEBAR_FILE = 'README.md';
    let sidebarData = [];
    let allLinks = [];

    const sidebarNav  = document.getElementById('sidebarNav');
    const mainContent = document.getElementById('mainContent');
    const breadcrumb  = document.getElementById('breadcrumb');
    const searchInput = document.getElementById('searchInput');
    const linkCount   = document.getElementById('linkCount');
    const siteTitle   = document.getElementById('siteTitle');
    const menuToggle  = document.getElementById('menuToggle');
    const sidebar     = document.getElementById('sidebar');
    const overlay     = document.getElementById('overlay');

    // Mobile
    menuToggle.addEventListener('click', () => {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('active');
    });
    overlay.addEventListener('click', () => {
      sidebar.classList.remove('open');
      overlay.classList.remove('active');
    });

    // ========================================================
    //  Parse README.md — two-step robust parser
    //  Step 1: regex extracts [label](url)
    //  Step 2: indexOf / lastIndexOf splits icon & desc
    // ========================================================
    function parseSidebarMarkdown(md) {
      var lines = md.split('\n');
      var sections = [];
      var currentSec = null;
      var totalLinks = 0;
      var inCodeBlock = false;

      for (var i = 0; i < lines.length; i++) {
        var raw = lines[i].replace(/\r$/, '');
        var trimmed = raw.trim();

        // Skip code blocks
        if (trimmed.indexOf('```') === 0) { inCodeBlock = !inCodeBlock; continue; }
        if (inCodeBlock) continue;
        if (!trimmed) continue;

        // # Title
        if (/^#\s/.test(trimmed) && !/^##/.test(trimmed)) {
          siteTitle.textContent = trimmed.replace(/^#\s+/, '').trim();
          continue;
        }

        // ## Section
        if (/^##\s/.test(trimmed)) {
          currentSec = { title: trimmed.replace(/^##\s+/, '').trim(), icon: '', items: [] };
          sections.push(currentSec);
          continue;
        }

        // > icon (short blockquote)
        if (currentSec && /^>\s*\S{1,6}\s*$/.test(trimmed)) {
          currentSec.icon = trimmed.replace(/^>\s*/, '').trim();
          continue;
        }

        // - [label](url) desc
        if (currentSec && /^[-*]\s/.test(trimmed)) {
          var m = trimmed.match(/$$(.+?)$$$$(.+?)$$/);
          if (!m) continue;

          var label = m[1].trim();
          var url   = m[2].trim();

          // icon: text between "- " and "["
          var bp = trimmed.indexOf('[');
          var icon = (bp > 1) ? trimmed.substring(1, bp).trim() : '';

          // desc: text after last ")"
          var lp = trimmed.lastIndexOf(')');
          var desc = (lp < trimmed.length - 1)
            ? trimmed.substring(lp + 1).trim().replace(/^[-–—:：\s]+/, '')
            : '';

          var item = { icon: icon, label: label, url: url, desc: desc };
          currentSec.items.push(item);
          allLinks.push({ icon: icon, label: label, url: url, desc: desc, section: currentSec.title });
          totalLinks++;
        }
      }

      console.log('[Nav] Parsed:', sections.length, 'sections,', totalLinks, 'links');
      linkCount.textContent = totalLinks;
      return sections;
    }

    // ========== Render Sidebar ==========
    function renderSidebar(sections) {
      if (!sections.length) {
        sidebarNav.innerHTML = '<div style="padding:20px;color:var(--text-muted);font-size:0.82rem;">README.md 中未找到导航数据</div>';
        return;
      }

      var html = '';
      for (var si = 0; si < sections.length; si++) {
        var sec = sections[si];
        html += '<div class="nav-section" data-section="' + si + '">';
        html += '<div class="nav-section-title" onclick="toggleSection(' + si + ')">';
        html += '<span>' + (sec.icon ? sec.icon + ' ' : '') + sec.title + '</span>';
        html += '<span class="chevron">&#9660;</span>';
        html += '</div><div class="nav-items">';

        if (!sec.items.length) {
          html += '<div style="padding:4px 28px;font-size:0.72rem;color:var(--text-muted);">暂无链接</div>';
        }

        for (var ii = 0; ii < sec.items.length; ii++) {
          var item = sec.items[ii];
          html += '<a class="nav-item" onclick="selectItem(' + si + ',' + ii + ',event)">';
          html += '<span class="item-icon">' + (item.icon || '&#8226;') + '</span>';
          html += '<span class="item-label">' + item.label + '</span>';
          html += '</a>';
        }

        html += '</div></div>';
      }

      sidebarNav.innerHTML = html;
    }

    function toggleSection(si) {
      var el = document.querySelector('.nav-section[data-section="' + si + '"]');
      if (el) el.classList.toggle('collapsed');
    }

    function selectItem(si, ii, e) {
      e.preventDefault();
      var sec  = sidebarData[si];
      var item = sec.items[ii];

      // Active state
      var items = document.querySelectorAll('.nav-item');
      for (var k = 0; k < items.length; k++) items[k].classList.remove('active');
      if (e.currentTarget) e.currentTarget.classList.add('active');

      breadcrumb.innerHTML =
        '<span>' + sec.title + '</span><span class="sep">/</span><span>' + item.label + '</span>';

      sidebar.classList.remove('open');
      overlay.classList.remove('active');

      if (item.url.match(/\.md$/)) {
        loadContent(item.url, item.label);
      } else {
        showLinkPage(sec, item);
      }
    }

    // ========== Show single link page ==========
    function showLinkPage(sec, item) {
      var html = '<div class="content-area">';
      html += '<h1>' + (sec.icon ? sec.icon + ' ' : '') + item.label + '</h1>';
      if (item.desc) {
        html += '<p style="color:var(--text-secondary);margin-bottom:8px;">' + item.desc + '</p>';
      }
      html += '<p><a class="visit-btn" href="' + item.url + '" target="_blank" rel="noopener">前往访问 &rarr;</a></p>';

      // Same-section recommendations
      if (sec.items.length > 1) {
        html += '<h2>同分类推荐</h2><div class="link-grid">';
        for (var i = 0; i < sec.items.length; i++) {
          var other = sec.items[i];
          if (other.url === item.url) continue;
          html += '<a class="link-card" href="' + other.url + '" target="_blank" rel="noopener">';
          html += '<div class="card-icon">' + (other.icon || '&#8226;') + '</div>';
          html += '<div class="card-body"><div class="card-title">' + other.label + '</div>';
          if (other.desc) html += '<div class="card-desc">' + other.desc + '</div>';
          html += '</div></a>';
        }
        html += '</div>';
      }

      html += '</div>';
      mainContent.innerHTML = html;
      mainContent.scrollTop = 0;
    }

    // ========== Load .md as content ==========
    function loadContent(url, label) {
      mainContent.innerHTML =
        '<div class="content-area"><p><span class="loading-spinner"></span> 加载 ' + label + ' ...</p></div>';

      fetch(url).then(function(resp) {
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        return resp.text();
      }).then(function(md) {
        mainContent.innerHTML = '<div class="content-area">' + marked.parse(md) + '</div>';
        mainContent.scrollTop = 0;
      }).catch(function(err) {
        mainContent.innerHTML =
          '<div class="content-area"><h1>' + label + '</h1><p style="color:var(--text-muted);">无法加载: ' + url + '<br>' + err.message + '</p></div>';
      });
    }

    // ========== Overview: show all links ==========
    function showOverview() {
      var html = '<div class="content-area">';
      html += '<h1>全部链接</h1>';

      for (var si = 0; si < sidebarData.length; si++) {
        var sec = sidebarData[si];
        if (!sec.items.length) continue;

        html += '<h2>' + sec.title + '</h2>';
        html += '<div class="link-grid">';

        for (var ii = 0; ii < sec.items.length; ii++) {
          var item = sec.items[ii];
          html += '<a class="link-card" href="' + item.url + '" target="_blank" rel="noopener">';
          html += '<div class="card-icon">' + (item.icon || '&#8226;') + '</div>';
          html += '<div class="card-body">';
          html += '<div class="card-title">' + item.label + '</div>';
          if (item.desc) html += '<div class="card-desc">' + item.desc + '</div>';
          html += '</div></a>';
        }

        html += '</div>';
      }

      html += '</div>';
      mainContent.innerHTML = html;
      breadcrumb.innerHTML = '<span>全部链接</span>';
      mainContent.scrollTop = 0;

      console.log('[Nav] Overview rendered, links:', allLinks.length);
    }

    // ========== Search ==========
    searchInput.addEventListener('input', function(e) {
      var q = e.target.value.toLowerCase().trim();

      // Reset sidebar visibility
      var sections = document.querySelectorAll('.nav-section');
      var navItems = document.querySelectorAll('.nav-item');
      var i;

      if (!q) {
        for (i = 0; i < sections.length; i++) sections[i].style.display = '';
        for (i = 0; i < navItems.length; i++) navItems[i].style.display = '';
        return;
      }

      // Filter sidebar
      for (i = 0; i < sections.length; i++) {
        var sec = sections[i];
        var hasVisible = false;
        var children = sec.querySelectorAll('.nav-item');
        for (var j = 0; j < children.length; j++) {
          var label = children[j].querySelector('.item-label').textContent.toLowerCase();
          var match = label.indexOf(q) !== -1;
          children[j].style.display = match ? '' : 'none';
          if (match) hasVisible = true;
        }
        sec.style.display = hasVisible ? '' : 'none';
        if (hasVisible) sec.classList.remove('collapsed');
      }

      // Search results in main area
      var results = [];
      for (i = 0; i < allLinks.length; i++) {
        var l = allLinks[i];
        if (l.label.toLowerCase().indexOf(q) !== -1 ||
            l.desc.toLowerCase().indexOf(q) !== -1 ||
            l.section.toLowerCase().indexOf(q) !== -1) {
          results.push(l);
        }
      }

      if (results.length) {
        var html = '<div class="content-area">';
        html += '<h1>搜索: "' + e.target.value + '"</h1>';
        html += '<p style="color:var(--text-muted);margin-bottom:20px;">找到 ' + results.length + ' 个结果</p>';
        html += '<div class="link-grid">';
        for (i = 0; i < results.length; i++) {
          var r = results[i];
          html += '<a class="link-card" href="' + r.url + '" target="_blank" rel="noopener">';
          html += '<div class="card-icon">' + (r.icon || '&#8226;') + '</div>';
          html += '<div class="card-body"><div class="card-title">' + r.label + '</div>';
          if (r.desc) html += '<div class="card-desc">' + r.desc + '</div>';
          html += '<div class="card-desc" style="color:var(--accent-dim);">' + r.section + '</div>';
          html += '</div></a>';
        }
        html += '</div></div>';
        mainContent.innerHTML = html;
      } else {
        mainContent.innerHTML =
          '<div class="content-area"><div class="empty-state" style="height:40vh;"><p>未找到匹配结果</p></div></div>';
      }
    });

    // ========== Init ==========
    (function init() {
      console.log('[Nav] Fetching', SIDEBAR_FILE);

      fetch(SIDEBAR_FILE).then(function(resp) {
        if (!resp.ok) throw new Error('HTTP ' + resp.status + ' — 文件不存在');
        return resp.text();
      }).then(function(md) {
        console.log('[Nav] File loaded,', md.length, 'chars');

        sidebarData = parseSidebarMarkdown(md);
        renderSidebar(sidebarData);

        if (sidebarData.length) {
          showOverview();
        }
      }).catch(function(err) {
        console.error('[Nav]', err);
        sidebarNav.innerHTML =
          '<div style="padding:20px;color:#c0392b;font-size:0.82rem;">' +
          '加载失败: ' + err.message + '<br><br>' +
          '<span style="color:var(--text-muted);">' +
          '请确保 <code>README.md</code> 存在于仓库根目录<br><br>' +
          '<strong>排查:</strong><br>' +
          '1. F12 → Console 查看日志<br>' +
          '2. 直接访问 <code>/README.md</code><br>' +
          '3. 确认 GitHub Pages 已开启' +
          '</span></div>';
      });
    })();
  </script>
</body>
</html>
