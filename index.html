<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>导航站</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      --bg: #ffffff;
      --surface: #f7f7f5;
      --surface-raised: #efeeeb;
      --border: #e2e0dc;
      --accent: #b8860b;
      --accent-dim: #9a7209;
      --accent-glow: rgba(184, 134, 11, 0.06);
      --text-primary: #1a1a1a;
      --text-secondary: #4a4744;
      --text-muted: #9a9793;
      --sidebar-w: 280px;
      --header-h: 56px;
      --radius: 6px;
      --font-display: 'Noto Serif SC', 'Georgia', serif;
      --font-mono: 'JetBrains Mono', 'Menlo', monospace;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 15px; scroll-behavior: smooth; }

    body {
      font-family: var(--font-mono);
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.7;
      overflow: hidden;
      height: 100vh;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .app { display: flex; height: 100vh; }

    /* ===== Sidebar ===== */
    .sidebar {
      width: var(--sidebar-w); min-width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      height: 100vh; position: relative; z-index: 10;
      transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .sidebar-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-header h1 {
      font-family: var(--font-display);
      font-size: 1.35rem; font-weight: 700;
      color: var(--text-primary);
    }

    .sidebar-header h1::before {
      content: '//'; color: var(--accent);
      margin-right: 6px;
      font-family: var(--font-mono); font-weight: 400;
    }

    .sidebar-search { padding: 12px 16px; flex-shrink: 0; }

    .sidebar-search input {
      width: 100%; padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-family: var(--font-mono); font-size: 0.8rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .sidebar-search input::placeholder { color: var(--text-muted); }
    .sidebar-search input:focus {
      border-color: var(--accent-dim);
      box-shadow: 0 0 0 3px rgba(184, 134, 11, 0.08);
    }

    .sidebar-nav { flex: 1; overflow-y: auto; padding: 8px 0 20px; }
    .nav-section { margin-bottom: 4px; }

    .nav-section-title {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 20px;
      font-size: 0.7rem; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--text-muted);
      cursor: pointer; user-select: none;
    }

    .nav-section-title:hover { color: var(--text-secondary); }

    .nav-section-title .chevron {
      font-size: 0.6rem; transition: transform 0.2s ease;
    }

    .nav-section.collapsed .chevron { transform: rotate(-90deg); }
    .nav-section.collapsed .nav-items { display: none; }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 20px 7px 28px;
      color: var(--text-secondary);
      text-decoration: none; font-size: 0.82rem;
      transition: all 0.15s ease;
      position: relative; cursor: pointer;
    }

    .nav-item::before {
      content: '';
      position: absolute; left: 0; top: 50%; transform: translateY(-50%);
      width: 2px; height: 0;
      background: var(--accent);
      transition: height 0.2s ease;
    }

    .nav-item:hover { color: var(--text-primary); background: var(--accent-glow); }
    .nav-item:hover::before { height: 60%; }
    .nav-item.active { color: var(--accent); background: var(--accent-glow); }
    .nav-item.active::before { height: 60%; }

    .nav-item .item-icon {
      font-size: 0.95rem; width: 18px;
      text-align: center; flex-shrink: 0;
    }

    .nav-item .item-label {
      flex: 1; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }

    /* ===== Main ===== */
    .main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    .main-header {
      height: var(--header-h); min-height: var(--header-h);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px;
      border-bottom: 1px solid var(--border);
      background: var(--bg); flex-shrink: 0;
    }

    .breadcrumb {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.8rem; color: var(--text-muted);
    }

    .breadcrumb span { color: var(--text-secondary); }
    .breadcrumb .sep { color: var(--text-muted); font-size: 0.7rem; }

    .menu-toggle {
      display: none;
      background: none; border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-secondary);
      padding: 6px 10px; font-size: 1rem; cursor: pointer;
    }

    .menu-toggle:hover { border-color: var(--accent-dim); color: var(--accent); }
    .main-content { flex: 1; overflow-y: auto; padding: 36px 40px 60px; }

    /* ===== Content ===== */
    .content-area { max-width: 960px; }

    .content-area h1 {
      font-family: var(--font-display);
      font-size: 2rem; font-weight: 700;
      margin-bottom: 12px; color: var(--text-primary);
    }

    .content-area h2 {
      font-family: var(--font-display);
      font-size: 1.45rem; font-weight: 700;
      margin-top: 36px; margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      color: var(--text-primary);
    }

    .content-area h2::before {
      content: '#'; color: var(--accent);
      margin-right: 8px;
      font-family: var(--font-mono); font-weight: 400; font-size: 1.1rem;
    }

    .content-area p { margin-bottom: 16px; color: var(--text-secondary); }

    .content-area a {
      color: var(--accent); text-decoration: none;
      border-bottom: 1px solid transparent;
    }

    .content-area a:hover { border-bottom-color: var(--accent); }

    .content-area code {
      background: var(--surface-raised);
      border: 1px solid var(--border);
      padding: 2px 6px; border-radius: 3px;
      font-family: var(--font-mono); font-size: 0.85em;
      color: var(--accent-dim);
    }

    .content-area pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      overflow-x: auto; margin-bottom: 20px;
    }

    .content-area pre code {
      background: none; border: none; padding: 0;
      color: var(--text-secondary); font-size: 0.82rem;
    }

    .content-area ul, .content-area ol {
      padding-left: 24px; margin-bottom: 16px; color: var(--text-secondary);
    }

    .content-area li { margin-bottom: 6px; }

    .content-area blockquote {
      border-left: 3px solid var(--accent);
      padding: 8px 16px; margin: 16px 0;
      background: var(--accent-glow); color: var(--text-secondary);
    }

    .content-area blockquote p { margin-bottom: 0; }

    /* ===== Link Grid ===== */
    .link-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px; margin-bottom: 28px;
    }

    .link-card {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none; color: var(--text-primary);
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s, background 0.2s;
      cursor: pointer;
    }

    .link-card:hover {
      border-color: var(--accent-dim);
      background: var(--accent-glow);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
    }

    .link-card .card-icon {
      width: 36px; height: 36px;
      border-radius: 8px; background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0;
      border: 1px solid var(--border);
    }

    .link-card .card-body { flex: 1; min-width: 0; }

    .link-card .card-title {
      font-size: 0.85rem; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .link-card .card-desc {
      font-size: 0.72rem; color: var(--text-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-top: 2px;
    }

    .visit-btn {
      display: inline-block; padding: 10px 24px;
      background: var(--accent); color: #fff;
      border-radius: var(--radius);
      font-weight: 500; font-size: 0.85rem;
      text-decoration: none; border-bottom: none;
      margin: 12px 0 28px;
      transition: background 0.2s;
    }

    .visit-btn:hover { background: var(--accent-dim); border-bottom: none; }

    .empty-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 60vh; color: var(--text-muted); text-align: center;
    }

    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.25; }
    .empty-state p { font-size: 0.85rem; }

    .loading-spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.6s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .sidebar-footer {
      padding: 12px 20px; border-top: 1px solid var(--border);
      font-size: 0.68rem; color: var(--text-muted);
      text-align: center; flex-shrink: 0;
    }

    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.25); z-index: 5;
    }

    .overlay.active { display: block; }

    /* ===== Diagnostic Panel ===== */
    .diag-panel {
      position: fixed; bottom: 0; left: 0; right: 0;
      max-height: 220px; overflow: auto;
      background: #1e1e1e; color: #d4d4d4;
      font-family: var(--font-mono); font-size: 0.72rem;
      padding: 12px 16px;
      border-top: 2px solid var(--accent);
      z-index: 9999;
      display: none;
    }

    .diag-panel.show { display: block; }

    .diag-panel .diag-line { padding: 1px 0; white-space: pre-wrap; word-break: break-all; }
    .diag-panel .diag-line.ok    { color: #6a9955; }
    .diag-panel .diag-line.link  { color: #dcdcaa; }
    .diag-panel .diag-line.warn  { color: #ce9178; }
    .diag-panel .diag-line.err   { color: #f44747; }
    .diag-panel .diag-line.info  { color: #569cd6; }

    .diag-toggle {
      position: fixed; bottom: 12px; right: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 6px 12px;
      font-size: 0.68rem; color: var(--text-muted);
      cursor: pointer; z-index: 10000;
      font-family: var(--font-mono);
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .diag-toggle:hover { border-color: var(--accent-dim); color: var(--accent); }

    /* ===== Mobile ===== */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed; left: 0; top: 0;
        transform: translateX(-100%);
        box-shadow: 4px 0 30px rgba(0, 0, 0, 0.12);
      }
      .sidebar.open { transform: translateX(0); }
      .menu-toggle { display: block; }
      .main-content { padding: 24px 20px 40px; }
      .link-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1 id="siteTitle">导航站</h1>
      </div>
      <div class="sidebar-search">
        <input type="text" id="searchInput" placeholder="搜索链接..." autocomplete="off">
      </div>
      <nav class="sidebar-nav" id="sidebarNav">
        <div style="padding:20px;color:var(--text-muted);font-size:0.82rem;">
          <span class="loading-spinner"></span> 加载中...
        </div>
      </nav>
      <div class="sidebar-footer">
        数据来源: README.md &middot; GitHub Pages
      </div>
    </aside>

    <div class="overlay" id="overlay"></div>

    <div class="main">
      <header class="main-header">
        <button class="menu-toggle" id="menuToggle">&#9776;</button>
        <div class="breadcrumb" id="breadcrumb"><span>首页</span></div>
        <div style="font-size:0.72rem;color:var(--text-muted);">
          <span id="linkCount">0</span> 个链接
        </div>
      </header>
      <div class="main-content" id="mainContent">
        <div class="empty-state">
          <div class="empty-icon">&#9881;</div>
          <p>请从左侧选择一个分类</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Diagnostic -->
  <button class="diag-toggle" id="diagToggle">诊断日志</button>
  <div class="diag-panel" id="diagPanel"></div>

  <script>
    // ========== Config ==========
    var SIDEBAR_FILE = 'README.md';
    var sidebarData = [];
    var allLinks = [];
    var diagLines = [];

    // ========== DOM ==========
    var sidebarNav  = document.getElementById('sidebarNav');
    var mainContent = document.getElementById('mainContent');
    var breadcrumb  = document.getElementById('breadcrumb');
    var searchInput = document.getElementById('searchInput');
    var linkCount   = document.getElementById('linkCount');
    var siteTitle   = document.getElementById('siteTitle');
    var menuToggle  = document.getElementById('menuToggle');
    var sidebar     = document.getElementById('sidebar');
    var overlay     = document.getElementById('overlay');
    var diagPanel   = document.getElementById('diagPanel');
    var diagToggle  = document.getElementById('diagToggle');

    // ========== Diag ==========
    function diag(cls, msg) {
      console.log('[Nav ' + cls + ']', msg);
      diagLines.push({ cls: cls, msg: msg });
      var div = document.createElement('div');
      div.className = 'diag-line ' + cls;
      div.textContent = msg;
      diagPanel.appendChild(div);
      diagPanel.scrollTop = diagPanel.scrollHeight;
    }

    diagToggle.addEventListener('click', function() {
      diagPanel.classList.toggle('show');
    });

    // ========== Mobile ==========
    menuToggle.addEventListener('click', function() {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('active');
    });
    overlay.addEventListener('click', function() {
      sidebar.classList.remove('open');
      overlay.classList.remove('active');
    });

    // ========================================================
    //  PARSER — ultra robust, charAt-based, heavy logging
    // ========================================================
    function parseSidebarMarkdown(md) {
      // Strip BOM
      if (md.charCodeAt(0) === 0xFEFF) {
        md = md.substring(1);
        diag('info', 'BOM 已移除');
      }

      var lines = md.split('\n');
      var sections = [];
      var currentSec = null;
      var inCodeBlock = false;

      diag('info', '共 ' + lines.length + ' 行');

      for (var i = 0; i < lines.length; i++) {
        // Normalize: strip \r, get trimmed
        var raw = lines[i].replace(/\r/g, '');
        var trimmed = raw.trim();

        // Empty
        if (!trimmed) continue;

        // Code fence
        if (trimmed.substring(0, 3) === '```') {
          inCodeBlock = !inCodeBlock;
          continue;
        }
        if (inCodeBlock) continue;

        // ---- Check what this line is ----
        var c0 = trimmed.charAt(0);
        var c1 = trimmed.charAt(1);
        var c2 = trimmed.charAt(2);

        // # Title (but not ## or ###)
        if (c0 === '#' && c1 === ' ') {
          siteTitle.textContent = trimmed.substring(2).trim();
          diag('ok', 'L' + (i+1) + ' 标题: ' + siteTitle.textContent);
          continue;
        }

        // ## Section
        if (c0 === '#' && c1 === '#' && c2 === ' ') {
          var secTitle = trimmed.substring(3).trim();
          currentSec = { title: secTitle, icon: '', items: [] };
          sections.push(currentSec);
          diag('ok', 'L' + (i+1) + ' 分类: ' + secTitle);
          continue;
        }

        // > icon line (single short token after >)
        if (c0 === '>' && currentSec) {
          var afterGt = trimmed.substring(1).trim();
          if (afterGt.length > 0 && afterGt.length <= 6 && afterGt.indexOf(' ') === -1) {
            currentSec.icon = afterGt;
            diag('ok', 'L' + (i+1) + ' 图标: ' + afterGt);
            continue;
          }
          // Regular blockquote, skip
          continue;
        }

        // List item with link: starts with "- " or "* "
        var isDash  = (c0 === '-' && c1 === ' ');
        var isStar  = (c0 === '*' && c1 === ' ');

        if (currentSec && (isDash || isStar)) {
          // Look for [text](url) pattern
          var lb = trimmed.indexOf('[');
          var rb = -1; // position of matching ]
          var lp = -1; // position of matching (

          if (lb !== -1) {
            rb = trimmed.indexOf(']', lb);
            if (rb !== -1 && rb + 1 < trimmed.length) {
              if (trimmed.charAt(rb + 1) === '(') {
                lp = trimmed.indexOf(')', rb + 1);
              }
            }
          }

          if (lb !== -1 && rb !== -1 && lp !== -1) {
            var label = trimmed.substring(lb + 1, rb).trim();
            var url   = trimmed.substring(rb + 2, lp).trim(); // between ( and )

            // icon: text between "- " and "["
            var icon = '';
            if (lb > 2) {
              icon = trimmed.substring(2, lb).trim();
            }

            // desc: text after last ")"
            var desc = '';
            if (lp < trimmed.length - 1) {
              desc = trimmed.substring(lp + 1).trim();
              // Strip leading punctuation
              desc = desc.replace(/^[-–—:：\s]+/, '');
            }

            var item = { icon: icon, label: label, url: url, desc: desc };
            currentSec.items.push(item);
            allLinks.push({
              icon: icon, label: label, url: url, desc: desc,
              section: currentSec.title
            });

            diag('link', 'L' + (i+1) + ' [' + icon + '] ' + label + ' → ' + url.substring(0, 50));
          } else {
            diag('warn', 'L' + (i+1) + ' 列表项无链接: ' + trimmed.substring(0, 60));
          }
          continue;
        }

        // Unrecognized line — silently skip
      }

      // Summary
      var total = allLinks.length;
      diag('info', '==== 解析完成: ' + sections.length + ' 分类, ' + total + ' 链接 ====');

      if (sections.length > 0 && total === 0) {
        diag('err', '警告: 找到分类但 0 个链接! 请检查 README.md 格式');
        diag('warn', '预期格式: - 🌐 [名称](https://...) 描述');
      }

      linkCount.textContent = total;
      return sections;
    }

    // ========== Render Sidebar ==========
    function renderSidebar(sections) {
      if (!sections.length) {
        sidebarNav.innerHTML =
          '<div style="padding:20px;color:var(--text-muted);font-size:0.82rem;">' +
          'README.md 中未找到分类 (需要 ## 标题)</div>';
        return;
      }

      var html = '';
      for (var si = 0; si < sections.length; si++) {
        var sec = sections[si];
        html += '<div class="nav-section" data-section="' + si + '">';
        html += '<div class="nav-section-title" onclick="toggleSection(' + si + ')">';
        html += '<span>' + (sec.icon ? sec.icon + ' ' : '') + escHtml(sec.title) + '</span>';
        html += '<span class="chevron">&#9660;</span>';
        html += '</div><div class="nav-items">';

        if (!sec.items.length) {
          html += '<div style="padding:4px 28px;font-size:0.72rem;color:var(--text-muted);">';
          html += '暂无链接</div>';
        }

        for (var ii = 0; ii < sec.items.length; ii++) {
          var item = sec.items[ii];
          html += '<a class="nav-item" onclick="selectItem(' + si + ',' + ii + ',event)">';
          html += '<span class="item-icon">' + (item.icon || '&#8226;') + '</span>';
          html += '<span class="item-label">' + escHtml(item.label) + '</span>';
          html += '</a>';
        }

        html += '</div></div>';
      }

      sidebarNav.innerHTML = html;
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function toggleSection(si) {
      var el = document.querySelector('.nav-section[data-section="' + si + '"]');
      if (el) el.classList.toggle('collapsed');
    }

    function selectItem(si, ii, e) {
      e.preventDefault();
      var sec  = sidebarData[si];
      var item = sec.items[ii];

      var all = document.querySelectorAll('.nav-item');
      for (var k = 0; k < all.length; k++) all[k].classList.remove('active');
      if (e.currentTarget) e.currentTarget.classList.add('active');

      breadcrumb.innerHTML =
        '<span>' + escHtml(sec.title) + '</span>' +
        '<span class="sep">/</span>' +
        '<span>' + escHtml(item.label) + '</span>';

      sidebar.classList.remove('open');
      overlay.classList.remove('active');

      if (item.url.match(/\.md(\?|$)/)) {
        loadMdContent(item.url, item.label);
      } else {
        showLinkPage(sec, item);
      }
    }

    // ========== Link detail page ==========
    function showLinkPage(sec, item) {
      var html = '<div class="content-area">';
      html += '<h1>' + (sec.icon ? sec.icon + ' ' : '') + escHtml(item.label) + '</h1>';
      if (item.desc) {
        html += '<p style="color:var(--text-secondary);margin-bottom:8px;">' + escHtml(item.desc) + '</p>';
      }
      html += '<p><a class="visit-btn" href="' + escHtml(item.url) + '" target="_blank" rel="noopener">';
      html += '前往访问 &rarr;</a></p>';

      if (sec.items.length > 1) {
        html += '<h2>同分类推荐</h2><div class="link-grid">';
        for (var i = 0; i < sec.items.length; i++) {
          var o = sec.items[i];
          if (o.url === item.url) continue;
          html += '<a class="link-card" href="' + escHtml(o.url) + '" target="_blank" rel="noopener">';
          html += '<div class="card-icon">' + (o.icon || '&#8226;') + '</div>';
          html += '<div class="card-body"><div class="card-title">' + escHtml(o.label) + '</div>';
          if (o.desc) html += '<div class="card-desc">' + escHtml(o.desc) + '</div>';
          html += '</div></a>';
        }
        html += '</div>';
      }

      html += '</div>';
      mainContent.innerHTML = html;
      mainContent.scrollTop = 0;
    }

    // ========== Load .md file ==========
    function loadMdContent(url, label) {
      mainContent.innerHTML =
        '<div class="content-area"><p><span class="loading-spinner"></span> 加载 ' + escHtml(label) + ' ...</p></div>';

      fetch(url).then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.text();
      }).then(function(md) {
        mainContent.innerHTML = '<div class="content-area">' + marked.parse(md) + '</div>';
        mainContent.scrollTop = 0;
      }).catch(function(err) {
        mainContent.innerHTML =
          '<div class="content-area"><h1>' + escHtml(label) + '</h1>' +
          '<p style="color:var(--text-muted);">无法加载: ' + escHtml(url) + '<br>' + err.message + '</p></div>';
      });
    }

    // ========== Overview ==========
    function showOverview() {
      var html = '<div class="content-area"><h1>全部链接</h1>';

      for (var si = 0; si < sidebarData.length; si++) {
        var sec = sidebarData[si];
        if (!sec.items.length) continue;
        html += '<h2>' + escHtml(sec.title) + '</h2><div class="link-grid">';

        for (var ii = 0; ii < sec.items.length; ii++) {
          var item = sec.items[ii];
          html += '<a class="link-card" href="' + escHtml(item.url) + '" target="_blank" rel="noopener">';
          html += '<div class="card-icon">' + (item.icon || '&#8226;') + '</div>';
          html += '<div class="card-body"><div class="card-title">' + escHtml(item.label) + '</div>';
          if (item.desc) html += '<div class="card-desc">' + escHtml(item.desc) + '</div>';
          html += '</div></a>';
        }

        html += '</div>';
      }

      html += '</div>';
      mainContent.innerHTML = html;
      breadcrumb.innerHTML = '<span>全部链接</span>';
      mainContent.scrollTop = 0;
    }

    // ========== Search ==========
    searchInput.addEventListener('input', function(e) {
      var q = e.target.value.toLowerCase().trim();
      var secs = document.querySelectorAll('.nav-section');
      var navItems = document.querySelectorAll('.nav-item');
      var i, j;

      if (!q) {
        for (i = 0; i < secs.length; i++) secs[i].style.display = '';
        for (i = 0; i < navItems.length; i++) navItems[i].style.display = '';
        return;
      }

      for (i = 0; i < secs.length; i++) {
        var has = false;
        var children = secs[i].querySelectorAll('.nav-item');
        for (j = 0; j < children.length; j++) {
          var lbl = children[j].querySelector('.item-label').textContent.toLowerCase();
          var match = lbl.indexOf(q) !== -1;
          children[j].style.display = match ? '' : 'none';
          if (match) has = true;
        }
        secs[i].style.display = has ? '' : 'none';
        if (has) secs[i].classList.remove('collapsed');
      }

      var results = [];
      for (i = 0; i < allLinks.length; i++) {
        var l = allLinks[i];
        if (l.label.toLowerCase().indexOf(q) !== -1 ||
            l.desc.toLowerCase().indexOf(q) !== -1 ||
            l.section.toLowerCase().indexOf(q) !== -1) {
          results.push(l);
        }
      }

      if (results.length) {
        var html = '<div class="content-area">';
        html += '<h1>搜索: "' + escHtml(e.target.value) + '"</h1>';
        html += '<p style="color:var(--text-muted);margin-bottom:20px;">找到 ' + results.length + ' 个结果</p>';
        html += '<div class="link-grid">';
        for (i = 0; i < results.length; i++) {
          var r = results[i];
          html += '<a class="link-card" href="' + escHtml(r.url) + '" target="_blank" rel="noopener">';
          html += '<div class="card-icon">' + (r.icon || '&#8226;') + '</div>';
          html += '<div class="card-body"><div class="card-title">' + escHtml(r.label) + '</div>';
          if (r.desc) html += '<div class="card-desc">' + escHtml(r.desc) + '</div>';
          html += '<div class="card-desc" style="color:var(--accent-dim);">' + escHtml(r.section) + '</div>';
          html += '</div></a>';
        }
        html += '</div></div>';
        mainContent.innerHTML = html;
      } else {
        mainContent.innerHTML =
          '<div class="content-area"><div class="empty-state" style="height:40vh;"><p>未找到匹配结果</p></div></div>';
      }
    });

    // ========================================================
    //  INIT
    // ========================================================
    (function init() {
      diag('info', '开始请求 ' + SIDEBAR_FILE);

      fetch(SIDEBAR_FILE).then(function(resp) {
        diag('info', 'HTTP ' + resp.status);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        return resp.text();
      }).then(function(md) {
        diag('info', '文件 ' + md.length + ' 字符');

        // Show first few lines for debug
        var preview = md.split('\n').slice(0, 8);
        for (var p = 0; p < preview.length; p++) {
          diag('info', '  L' + (p+1) + ': ' + preview[p].replace(/\r/g, '').substring(0, 80));
        }

        sidebarData = parseSidebarMarkdown(md);
        renderSidebar(sidebarData);

        if (sidebarData.length && allLinks.length) {
          showOverview();
        } else if (sidebarData.length && !allLinks.length) {
          mainContent.innerHTML =
            '<div class="content-area"><div class="empty-state" style="height:40vh;">' +
            '<div class="empty-icon">&#9888;</div>' +
            '<p>找到 ' + sidebarData.length + ' 个分类，但 0 个链接</p>' +
            '<p style="font-size:0.75rem;margin-top:8px;">请检查 README.md 中链接格式<br>' +
            '应为: <code>- 🌐 [名称](https://...) 描述</code></p>' +
            '<p style="font-size:0.72rem;margin-top:12px;color:var(--text-muted);">' +
            '点击右下角「诊断日志」查看详情</p>' +
            '</div></div>';
        }
      }).catch(function(err) {
        diag('err', '加载失败: ' + err.message);
        sidebarNav.innerHTML =
          '<div style="padding:20px;color:#c0392b;font-size:0.82rem;">' +
          '加载失败: ' + err.message + '<br><br>' +
          '<span style="color:var(--text-muted);">' +
          '请确保 <code>README.md</code> 存在于仓库根目录</span></div>';
      });
    })();
  </script>
</body>
</html>
